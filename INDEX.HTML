<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor Expres - Chef</title>
    
    <script src="https://cdn.tailwindcss.com"></script> 
    <style>
        /* Estilos esenciales para el chat */
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .chat-container { height: 90vh; }
        .user-message { 
            background-color: #991b1b; 
            color: white; 
            border-radius: 18px 18px 0 18px; 
            white-space: pre-wrap;
        }
        .bot-message { 
            background-color: #fef3c7; 
            color: #1f2937; 
            border-radius: 18px 18px 18px 0; 
            white-space: pre-wrap;
        }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <div class="chat-container w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">
        <div class="bg-red-800 p-4 flex items-center justify-between shadow-md">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">👨‍🍳</span>
                <h1 class="text-white font-bold text-xl">Sabor Expres</h1>
            </div>
            <button onclick="limpiarChat()" class="text-red-200 hover:text-white text-sm bg-red-900/30 px-3 py-1 rounded-full">Limpiar</button>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50"></div>

        <div id="loading" class="hidden px-6 py-2">
            <div class="flex space-x-1">
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-200">
            <form onsubmit="enviarMensaje(event)" class="flex space-x-2">
                <input id="user-input" type="text" placeholder="Ej: Receta de arepas..." class="flex-1 p-3 border border-gray-300 rounded-full focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600" autocomplete="off">
                <button type="submit" id="btn-enviar" class="bg-red-800 text-white p-3 rounded-full hover:bg-red-900 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // *** INSERTA TU NUEVA CLAVE API AQUÍ ***
        const API_KEY = "AIzaSyDLuMATmrUEE5eYPxlm9VaoSJggbaI-i84"; 
        const chatBox = document.getElementById('chat-box');
        
        window.onload = () => agregarMensaje("¡Hola! Soy Sabor Expres. 🍳 ¿Qué cocinamos hoy?", 'bot');

        function agregarMensaje(html, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="p-3 max-w-[85%] ${sender === 'user' ? 'user-message' : 'bot-message'} shadow-sm">${html}</div></div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function limpiarChat() {
            chatBox.innerHTML = '';
            agregarMensaje("¡Chat limpio! ¿Qué más necesitas?", 'bot');
        }

        async function enviarMensaje(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const texto = input.value.trim();
            if (!texto) return;
            if (API_KEY === "TU_NUEVA_CLAVE_API_AQUI") {
                 agregarMensaje("⚠️ Error: Inserta tu clave API en el código antes de continuar.", 'bot');
                 return;
            }

            agregarMensaje(texto, 'user');
            input.value = '';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('btn-enviar').disabled = true;

            try {
                // LLAMADA A LA API DE GEMINI
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: texto }] }],
                        config: {
                             systemInstruction: "Eres un chef experto llamado Sabor Expres. Responde solo sobre cocina, recetas y alimentos. Sé amable y usa emojis y habla siempre en español." 
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);
                
                const respuesta = data.candidates[0].content.parts[0].text;
                let respuestaFormateada = respuesta.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
                
                agregarMensaje(respuestaFormateada, 'bot');

            } catch (error) {
                console.error("Error al conectar con Gemini:", error);
                // Si falla en el servidor, la clave es inválida o fue revocada.
                agregarMensaje("⚠️ Error: La clave API actual ha sido deshabilitada por seguridad o no es válida. Debes generar una nueva.", 'bot');
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btn-enviar').disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
